<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveyor Login</title>
  <style>
    :root {
      --bg-start: #0b1f3a;
      --bg-end: #1d4e89;
      --card: rgba(255, 255, 255, 0.12);
      --text: #f6f9ff;
      --accent: #f4b400;
      --accent-hover: #ffca36;
      --shadow: 0 18px 45px rgba(8, 17, 34, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      position: relative;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: url('bg1.png') center/cover no-repeat fixed;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.25);
      margin-bottom: 24px;
    }

    .logo-wrapper img {
      width: 160px;
      height: auto;
      display: block;
    }

    .container {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      letter-spacing: 0.02em;
      margin-bottom: 16px;
      text-align: center;
    }

    form {
      display: grid;
      gap: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(0, 0, 0, 0.9);
      color: var(--text);
      font-size: 1rem;
    }

    input::placeholder {
      color: rgba(246, 249, 255, 0.6);
    }

    .button-row {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .button-link,
    .submit-button {
      text-decoration: none;
      border: none;
      cursor: pointer;
      color: #13213d;
      background: var(--accent);
      font-weight: 700;
      border-radius: 12px;
      padding: 16px 18px;
      text-align: center;
      transition: transform 0.2s ease, background 0.2s ease;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .button-link:hover,
    .submit-button:hover,
    .button-link:focus-visible,
    .submit-button:focus-visible {
      background: var(--accent-hover);
      transform: translateY(-2px);
      outline: none;
    }

    .footer-links {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-links a {
      color: white;
      opacity: 0.88;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .footer-links a:hover,
    .footer-links a:focus-visible {
      opacity: 1;
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      .container {
        padding: 28px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="logo-wrapper">
    <img src="UPlogo.png" alt="UnitedPulse logo" />
  </div>
  <main class="container">
    <h1>Surveyor Login</h1>
    <form action="#" method="post" aria-label="Surveyor login form">
      <div>
        <label for="username">Name</label>
        <input id="username" name="username" type="text" placeholder="Enter your name" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required />
      </div>
      <div>
        <label for="security">Security Question</label>
        <select id="security" name="security" required>
          <option value="">Select a question</option>
          <option value="mother">What is your mother's first name?</option>
          <option value="school">What was your first school name?</option>
          <option value="teacher">What is your favorite teacher�s name?</option>
          <option value="city">What is your birth city?</option>
        </select>
      </div>
      <div>
        <label for="security-answer">Answer</label>
        <input id="security-answer" name="security-answer" type="text" placeholder="Enter your answer" required />
      </div>
      <div class="button-row">
        <button class="submit-button" type="submit">Continue</button>
      </div>
    </form>

    <div class="footer-links">
      <a href="ssignup.html">Need an account? Sign Up</a>
      <a href="surveyor.html">← Return to Surveyor</a>
    </div>
  </main>
</body>
</html>
