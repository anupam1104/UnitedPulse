<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnitedPulse | Surveyor Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
[data-theme="dark"] {
  --bg-primary: linear-gradient(135deg, #0b1f3a, #1d4e89); /* Night dark blue */
--card-bg: rgba(255,255,255,0.15);
  --text-primary: #3b82f6;
  --text-secondary: #60a5fa;
  --accent: linear-gradient(135deg, #3b82f6, #1d4ed8); /* Blue accent */
  --border: rgba(255,255,255,0.2);
}

[data-theme="dark"] {
  --bg-primary: linear-gradient(135deg, #0b1f3a, #1d4e89); /* Night dark blue */
--card-bg: rgba(255,255,255,0.15);
--text-primary: #f1f5f9;
  --text-secondary: #e2e8f0;
  --border: rgba(255,255,255,0.2);
}

/* Global - minimal original + bg */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background-image: url('bg4.jpeg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: var(--text-primary);
}
.app { display: flex; min-height: 100vh; }

/* Sidebar - original simple */
.sidebar {
  width: 240px;
  background: linear-gradient(180deg, #421b4b, #0e1467);
  color: white;
  padding: 24px;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
.logo img { width: 40px; }
.nav-item {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 1.05em;
  font-weight: 500;
  color: white;
}
.nav-item:hover { background: rgba(255,255,255,0.15); }

.sidebar a { 
  text-decoration: none; 
}

.sidebar a .nav-item { 
  color: var(--text-primary, white); 
  text-decoration: none !important; 
}

/* Content - original */
.content { flex: 1; padding: 30px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 { margin: 0; }

/* Button + theme toggle */
.btn {
  background: linear-gradient(180deg, #1e1b4b, #1e3a8a);
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
.theme-toggle {
  display: none;
}
[data-theme="dark"] .theme-toggle {
  color: white;
  border-color: rgba(255,255,255,0.3);
}

/* Stats - original */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  margin-top: 20px;
}
.card {
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 15px;
  border: 1px solid var(--border);
}
.card h4 { margin: 0 0 10px; color: var(--text-secondary); font-size: 1.05em; font-weight: 500; }
.card p { font-size: 2rem; margin: 0; font-weight: 700; }

/* Main - original + chart */
.main {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  margin-top: 20px;
  color:#ffffff;
}

/* Survey List - original */
.list li {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  list-style: none;
}

/* Status badges - original */
.status {
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 0.75rem;
  margin-left: 10px;
}
.pending { background: #f59e0b; color: white; }
.approved { background: #10b981; color: white; }
.rejected { background: #ef4444; color: white; }

/* Modal - original + dark */
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
}
.modal-box {
  background: linear-gradient(180deg, #1e1b4b, #1e3a8a);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  color: white;
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.modal-box input, .modal-box select, .modal-box textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: white;
}
[data-theme="dark"] .modal-box input, 
[data-theme="dark"] .modal-box select, 
[data-theme="dark"] .modal-box textarea {
  background: rgba(255,255,255,0.1);
  color: rgb(249, 249, 249);
}
</style>
</head>

<body>

  <!-- TOKEN GUARD: runs before anything renders -->
  <script>
    (function () {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('🔒 Surveyor access only. Please log in.');
        window.location.href = '../slogin.html';
        return;
      }
    })();
  </script>

<div class="app">

<!-- Sidebar - original -->
<aside class="sidebar">
  <div class="logo">
    <img src="../UPlogo.png">
    <h2>UnitedPulse</h2>
  </div>
  
  <div class="nav-item active"><strong>Dashboard</strong></div>
  
  <a href="../dashboard/sprofile.html">
    <div class="nav-item"><strong>Profile</strong></div>
  </a>
  
  <div style="margin-top: 20px;"></div>
  <a href="../dashboard/trackreport.html" class="nav-item"><i class="fas-fa-sign-out-alt" ></i><strong>Track Reports</strong></a>
  <div style="margin-top: 40px;"></div>
  <a href="../index.html" class="nav-item">
    <i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i><strong>LogOut</strong>
  </a>

</aside>

<!-- Content - original -->
<main class="content">

<header>
  <h1>Surveyor Dashboard</h1>
  <div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
      <i class="fas fa-moon"></i>
    </button>
    <button class="btn" onclick="openModal()">+ Submit Field Survey</button>
  </div>
</header>

<!-- Stats - original labels -->
<div class="stats">
  <div class="card"><h4>Surveys Submitted</h4><p>12</p></div>
  <div class="card"><h4>Areas Covered</h4><p>5</p></div>
  <div class="card"><h4>Under Review</h4><p>3</p></div>
  <div class="card"><h4>Approved</h4><p>9</p></div>
</div>

<!-- Main - original + chart -->
<div class="main">

  <div class="card">
    <h3>Recent Surveys <button onclick="loadSurveys()" style="float: right; background: none; border: none; color: var(--text-secondary); cursor: pointer;"><i class="fas fa-sync"></i></button></h3>
    <ul class="list" id="surveyList">
      <li style="opacity: 0.6; text-align: center;">Loading surveys...</li>
    </ul>
  </div>

  <!-- Impact + simple chart -->
  <div class="card">
    <h3>Your Impact</h3>
    <p id="impactSolvedCount">0 problems solved</p>
    <p id="impactWaterCount">0 water issues resolved</p>
    <canvas id="statusChart" width="200" height="200"></canvas>
  </div>

</div>

</main>
</div>

<!-- Modal - original fields -->
<div class="modal" id="modal">
<div class="modal-box">
    <h3><i class="fas fa-plus-circle"></i> Add Field Report</h3>
<input id="reportName" placeholder="Report Name *" required style="width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: rgba(255,255,255,0.1); color: white;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      <input id="surveyorName" placeholder="Name of Surveyor *" required>
      <input id="surveyDate" type="date" placeholder="Date of Survey *" required>
      <input id="areaSurveyed" placeholder="Area Surveyed *" required>
      <input id="problemsNoticed" placeholder="Problems Noticed *" required>
    </div>
    <textarea id="description" placeholder="Description *" rows="5" style="width: 100%; margin: 15px 0; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.1); color: white;" required></textarea>
    <div>
      <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">Upload Images *</label>
      <input id="imageUpload" type="file" multiple accept="image/*" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.1); color: white;">
      <small id="imagePreview" style="display: block; margin-top: 8px;"></small>
    </div>
    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
      <button onclick="saveDraft()" style="background: #6b7280; color: white; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer;">Save Draft</button>
      <button onclick="submitReport()" class="btn">Submit for Approval</button>
      <button onclick="closeModal()" style="background: #ef4444; color: white; padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer;">Cancel</button>
    </div>
  </div>
</div>

<script>
// Theme toggle
// Theme fixed to dark mode
document.body.setAttribute('data-theme', 'dark');

// Original modal
let draftData = {};

function openModal() {
  document.getElementById("modal").style.display="flex";
  document.getElementById('surveyDate').valueAsDate = new Date();
  loadDraft();
}

function closeModal() {
  document.getElementById("modal").style.display="none";
}

function saveDraft() {
  draftData = {
    reportName: document.getElementById('reportName').value,
    surveyorName: document.getElementById('surveyorName').value,
    surveyDate: document.getElementById('surveyDate').value,
    areaSurveyed: document.getElementById('areaSurveyed').value,
    problemsNoticed: document.getElementById('problemsNoticed').value,
    description: document.getElementById('description').value
  };
  localStorage.setItem('surveyDraft', JSON.stringify(draftData));
  alert('Draft saved!');
}

function loadDraft() {
  const saved = localStorage.getItem('surveyDraft');
  if (saved) {
    const data = JSON.parse(saved);
    document.getElementById('reportName').value = data.reportName || '';
    document.getElementById('surveyorName').value = data.surveyorName || '';
    document.getElementById('surveyDate').value = data.surveyDate || '';
    document.getElementById('areaSurveyed').value = data.areaSurveyed || '';
    document.getElementById('problemsNoticed').value = data.problemsNoticed || '';
    document.getElementById('description').value = data.description || '';
  }
}

async function submitReport() {
  const formData = new FormData();
  const fields = ['reportName', 'surveyorName', 'surveyDate', 'areaSurveyed', 'problemsNoticed', 'description'];
  let valid = true;
  fields.forEach(id => {
    const value = document.getElementById(id).value.trim();
    if (!value) {
      valid = false;
      alert(id.replace(/([A-Z])/g, ' $1').toUpperCase() + ' is required');
      return;
    }
    formData.append(id, value);
  });
  if (!document.getElementById('imageUpload').files.length) {
    valid = false;
    alert('Please upload at least one image');
  }
  if (!valid) return;

  Array.from(document.getElementById('imageUpload').files).forEach((file, index) => {
    formData.append('images', file);
  });

  try {
    const token = localStorage.getItem('token');
    const res = await fetch('https://unitedpulse.onrender.com/api/surveys/create', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`
      },
      body: formData
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.message || 'Failed to submit report');
    }

    alert('Field report submitted for approval!');
    closeModal();
    localStorage.removeItem('surveyDraft');
    document.querySelectorAll('#modal input, #modal textarea').forEach(el => el.value = '');
    document.getElementById('imageUpload').value = '';
    document.getElementById('imagePreview').innerHTML = '';
    // Reload surveys to show the new one
    loadSurveys();
  } catch (error) {
    alert('Could not submit report. ' + error.message);
  }
}

// Function to fetch and display recent surveys dynamically
async function loadSurveys() {
  try {
    const list = document.getElementById('surveyList');
    list.innerHTML = '<li style="opacity: 0.6; text-align: center;">Loading...</li>';
    
    // Fetch ONLY my personal surveys
    const token = localStorage.getItem('token');
    const res = await fetch('https://unitedpulse.onrender.com/api/surveys/me', {
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });
    if (!res.ok) throw new Error('Failed to load surveys');
    
    const data = await res.json();
    const surveys = data.surveys || data || [];
    
    // Stats update
    const underReview = surveys.filter(s => s.status === 'pending' || s.status === 'in-progress' || s.status === 'Under Work' || s.status === 'Pending').length;
    const approvedCount = surveys.filter(s => s.status === 'resolved' || s.status === 'completed' || s.status === 'Resolved').length;
    const rejectedCount = surveys.filter(s => s.status === 'rejected' || s.status === 'Rejected').length;
    
    // Dynamically calculate logically unique mapping areas
    const uniqueAreas = new Set(
      surveys
        .map(s => (s.area || s.location || s.areaSurveyed || '').trim().toLowerCase())
        .filter(area => area !== '' && area !== 'n/a')
    ).size;

    // Update stats UI dynamically if possible (targeting the 3rd and 4th card p tags)
    const statsCards = document.querySelectorAll('.stats .card p');
    if (statsCards.length >= 4) {
      statsCards[0].textContent = surveys.length; // Total submitted
      statsCards[1].textContent = uniqueAreas; // Areas Covered
      statsCards[2].textContent = underReview; // Under Review
      statsCards[3].textContent = approvedCount; // Approved
    }

    if (surveys.length === 0) {
      list.innerHTML = '<li style="opacity: 0.6; text-align: center;">No surveys found.</li>';
      return;
    }

    // Render recently submitted surveys in the list
    list.innerHTML = surveys.slice(0, 5).map(s => {
      let statusClass = 'pending';
      let statusText = 'Under Review';
      const lowercaseStatus = (s.status || '').toLowerCase();
      
      if (lowercaseStatus === 'resolved' || lowercaseStatus === 'completed') {
        statusClass = 'approved';
        statusText = 'Approved';
      } else if (lowercaseStatus === 'rejected') {
        statusClass = 'rejected';
        statusText = 'Rejected';
      } else if (lowercaseStatus === 'in-progress') {
        statusClass = 'pending';
        statusText = 'In Progress';
      }
      
      // Attempt to find issue and location
      const title = s.title || s.reportName || s.issue || 'Survey Report';
      const loc = s.area || s.location || 'Unknown location';
      
      return `<li>${title} - ${loc} <span class="status ${statusClass}">${statusText}</span></li>`;
    }).join('');

    // Update Your Impact metrics
    const problemsSolved = surveys.filter(s => {
      const lowercaseStatus = (s.status || '').toLowerCase();
      return lowercaseStatus === 'resolved' || lowercaseStatus === 'completed';
    });
    
    document.getElementById('impactSolvedCount').textContent = `${problemsSolved.length} problem${problemsSolved.length === 1 ? '' : 's'} solved`;

    const waterIssues = problemsSolved.filter(s => (s.category || '').toLowerCase() === 'water');
    document.getElementById('impactWaterCount').textContent = `${waterIssues.length} water issue${waterIssues.length === 1 ? '' : 's'} resolved`;

    // Update chart
    updateChart(underReview, approvedCount, rejectedCount);

  } catch (err) {
    console.error('Error fetching surveys:', err);
    document.getElementById('surveyList').innerHTML = '<li style="color: #ef4444; font-size: 0.9em; text-align: center;">Failed to load surveys. Ensure backend is running.</li>';
  }
}

document.getElementById('imageUpload').addEventListener('change', function() {
  const preview = document.getElementById('imagePreview');
  preview.innerHTML = `${this.files.length} image(s) selected`;
});

// Simple chart
let statusChartObj = null;

function updateChart(reviewCount, approvedCount, rejectedCount) {
  const ctx = document.getElementById('statusChart').getContext('2d');
  
  if (statusChartObj) {
    statusChartObj.data.datasets[0].data = [reviewCount, approvedCount, rejectedCount];
    statusChartObj.update();
  } else {
    statusChartObj = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Review', 'Approved', 'Rejected'],
        datasets: [{ data: [reviewCount, approvedCount, rejectedCount], backgroundColor: ['#f59e0b', '#10b981', '#ef4444'] }]
      },
      options: { 
        responsive: true,
        plugins: {
          legend: {
            labels: {
              color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary') || '#f6f9ff'
            }
          }
        }
      }
    });
  }
}

// Ensure surveys are loaded on startup
document.addEventListener('DOMContentLoaded', () => {
    loadSurveys();
});
</script>

</body>
</html>
