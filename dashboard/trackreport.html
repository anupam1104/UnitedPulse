header {

/* Button + theme toggle */

th {

  letter-spacing: 0.5px;

td {

}

/* Hover effect */

/* Center Date Column */

.status {

/* Status Colors */
.review {

}

/* NGO dash (—) styling */
td:has(> span:empty),
td:empty {

}

/* Loading status */
.state-row td {
  text-align: center;
  padding: 40px;
  color: rgba(255,255,255,0.5);

  </style>

<body>
  <!-- TOKEN GUARD: protects access to the tracker -->
  <script>
    (function () {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('🔒 Surveyor access only. Please log in.');
        window.location.href = '../slogin.html';
        return;
      }
    })();
  </script>
  <!-- Sidebar -->
  <div class="container">  
  <aside class="sidebar">
  <div class="logo">
    <img src="../UPlogo.png">
    <h2>UnitedPulse</h2>
  </div>
  <a href="../dashboard/sdash.html" >
    <div class="nav-item active"><strong>Dashboard</strong></div>
  </a>
  <a href="../dashboard/sprofile.html">
    <div class="nav-item"><strong>Profile</strong></div>
  </a>
  
  <div style="margin-top: 20px;"></div>
  <a href="../dashboard/trackreport.html" class="nav-item"><i class="fas-fa-sign-out-alt" ></i><strong>Track Reports</strong></a>
  <div style="margin-top: 40px;"></div>
  <a href="../index.html" class="nav-item">
    <i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i><strong> LogOut</strong>
  </a>

</aside>

<!-- Content -->
<main class="content">

<header>
  <h1>Track Reports</h1>
  <div>
    <button class="btn" onclick="openModal()">🔍 Search</button>
  </div>
</header>

<table id="reportsTable">
  <thead>
    <tr>
      <th>Report Name</th>
      <th>Date</th>
      <th>Status</th>
      <th>NGO Assigned</th>
    </tr>
  </thead>
  <tbody id="trackTableBody">
    <tr class="state-row"><td colspan="4">⏳ Loading your submissions…</td></tr>
  </tbody>
</table>

</main>
</div>

<script>
  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe.toString()
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return isNaN(d.getTime()) ? '—' : d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function getStatusBadge(status) {
    const s = (status || '').toLowerCase();
    if (s === 'resolved' || s === 'completed') return '<span class="status resolved">Resolved</span>';
    if (s === 'in-progress' || s === 'under work') return '<span class="status progress">In Progress</span>';
    return '<span class="status review">Under Review</span>';
  }

  async function loadMyReports() {
    const tbody = document.getElementById('trackTableBody');
    try {
      const token = localStorage.getItem('token');
      const res = await fetch('https://unitedpulse.onrender.com/api/surveys/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!res.ok) throw new Error('Failed to load surveys');
      const data = await res.json();
      const surveys = data.surveys || data || [];

      if (surveys.length === 0) {
        tbody.innerHTML = '<tr class="state-row"><td colspan="4">📭 No reports submitted yet.</td></tr>';
        return;
      }

      tbody.innerHTML = surveys.map(s => {
        const title = s.title || s.reportName || s.issue || 'Survey Report';
        const dateStr = formatDate(s.createdAt || s.date || s.surveyDate);
        const ngoStr = (s.ngoAssigned && s.ngoAssigned !== 'None') ? s.ngoAssigned : '—';
        
        return `
          <tr>
            <td>${escapeHtml(title)}</td>
            <td>${escapeHtml(dateStr)}</td>
            <td>${getStatusBadge(s.status)}</td>
            <td>${escapeHtml(ngoStr)}</td>
          </tr>
        `;
      }).join('');
    } catch (err) {
      console.error(err);
      tbody.innerHTML = '<tr class="state-row"><td colspan="4" style="color:#ef4444;">❌ Failed to load tracking data. Make sure you are logged in.</td></tr>';
    }
  }

  document.addEventListener('DOMContentLoaded', loadMyReports);
</script>
</body>
</html>
