<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnitedPulse | Admin Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: linear-gradient(135deg, #0b1f3a, #1d4e89);
      --card: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.2);
      --accent: linear-gradient(135deg, #ef4444, #dc2626);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: url('bg4.jpeg') center/cover no-repeat fixed;
      color: var(--text);
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #421b4b, #0e1467);
      color: white;
      padding: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .logo img {
      width: 40px;
    }

    .nav-item {
      padding: 12px;
      color: white;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1.05em;
      font-weight: 500;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .sidebar a,
    a.nav-item {
      color: white;
      text-decoration: none !important;
    }


    /* Content */
    .content {
      flex: 1;
      padding: 30px;
    }


    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .card p {
      font-size: 1.8rem;
      margin: 0;
    }

    /* Table */
    .table {
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    /* Buttons */
    .btn {
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 5px;
    }

    .approve {
      background: #10b981;
      color: white;
    }

    .reject {
      background: #ef4444;
      color: white;
    }

    .assign {
      background: #3b82f6;
      color: white;
    }

    /* Status */
    .status {
      padding: 4px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
    }

    .pending {
      background: orange;
    }

    .progress {
      background: #3b82f6;
    }

    .resolved {
      background: #22c55e;
    }

    /* Insights */
    .insights {
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

  <!-- TOKEN GUARD: runs before anything renders -->
  <script>
    (function () {
      const token = localStorage.getItem('token');

      // No token → redirect to login
      if (!token) {
        alert('🔒 Admin access only. Please log in.');
        window.location.href = '../index.html';
        return;
      }

      // Decode JWT payload (no library needed — just base64)
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));

        // Check expiry
        const now = Math.floor(Date.now() / 1000);
        if (payload.exp && payload.exp < now) {
          localStorage.removeItem('token');
          alert('⏱ Session expired. Please log in again.');
          window.location.href = '../index.html';
          return;
        }

        // Check role if stored alongside token
        const role = localStorage.getItem('role');
        if (role && role !== 'admin') {
          alert('🚫 Access denied. Admin only.');
          window.location.href = '../index.html';
          return;
        }

      } catch (e) {
        // Malformed token
        localStorage.removeItem('token');
        window.location.href = '../index.html';
      }
    })();
  </script>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../UPlogo.png">
        <h2>UnitedPulse</h2>
      </div>
      <a href="./adash.html">
        <div class="nav-item active"><strong>Dashboard</strong></div>
      </a>
      <a href="./rm.html">
        <div class="nav-item"><strong>Reports Management</strong></div>
      </a>
      <a href="./complaints.html">
        <div class="nav-item"><strong>Complaints Management</strong></div>
      </a>
      <a href="./ngo.html">
        <div class="nav-item"><strong>NGO</strong></div>
      </a>
      <a href="./analysis.html">
        <div class="nav-item"><strong>Analytics</strong></div>
      </a>
      <div style="margin-top: 20px;"></div>

      <a href="../index.html" class="nav-item">
        <i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i><strong>LogOut</strong>
      </a>
    </aside>

    <!-- Content -->
    <main class="content">

      <header>
        <h1>Admin Dashboard</h1>
      </header>

      <!-- Stats -->
      <div class="stats">
        <div class="card">
          <h4>Total</h4>
          <p id="stat-total">—</p>
        </div>
        <div class="card">
          <h4>Pending</h4>
          <p id="stat-pending">—</p>
        </div>
        <div class="card">
          <h4>In Progress</h4>
          <p id="stat-progress">—</p>
        </div>
        <div class="card">
          <h4>Resolved</h4>
          <p id="stat-resolved">—</p>
        </div>
      </div>

      <!-- Table -->
      <div class="table">
        <h3>Recent Complaints <span id="lastUpdated" style="font-size:0.75rem;opacity:0.6;font-weight:400;margin-left:8px;"></span> <button class="btn" style="float:right;font-size:0.75rem;padding:4px 10px;" onclick="loadDashboardData(true)">🔄 Refresh</button></h3>

        <table id="recentComplaintsTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Area</th>
              <th>Issue</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="5" style="text-align:center;opacity:0.6;">⏳ Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Insights -->
      <div class="insights">
        <h3>Smart Insights</h3>
        <p id="insight-1">⚠ Loading insights…</p>
        <p id="insight-2">📈 Loading insights…</p>
      </div>

    </main>
  </div>

  <script>
    const COMPLAINTS_API = 'https://unitedpulse.onrender.com/api/complaints';
    const SURVEYS_API = 'https://unitedpulse.onrender.com/api/surveys/public';

    function getToken() {
      return localStorage.getItem('token') || '';
    }

    function statusClass(status) {
      if (status === 'pending') return 'pending';
      if (status === 'in-progress') return 'progress';
      if (status === 'resolved') return 'resolved';
      return 'pending';
    }

    function statusLabel(status) {
      if (status === 'pending') return 'Pending';
      if (status === 'in-progress') return 'In Progress';
      if (status === 'resolved') return 'Resolved';
      return status;
    }

    function formatCategory(cat) {
      const map = {
        water: 'Water',
        health: 'Health',
        education: 'Education',
        road: 'Roads',
        electricity: 'Electricity',
        sanitation: 'Sanitation',
        other: 'Others'
      };
      return map[cat] || cat || '—';
    }

    async function loadDashboardData(manual = false) {
      const token = getToken();
      if (!token) return;

      try {
        const complaintsRes = await fetch(COMPLAINTS_API, {
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        const surveysRes = await fetch(SURVEYS_API, {
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        if (!complaintsRes.ok || !surveysRes.ok) {
          console.warn('Failed to load dashboard data:', complaintsRes.status, surveysRes.status);
          return;
        }

        const [complaintsData, surveysData] = await Promise.all([
          complaintsRes.json(),
          surveysRes.json()
        ]);
        const complaints = Array.isArray(complaintsData) ? complaintsData : (complaintsData.complaints || []);
        const surveys = Array.isArray(surveysData) ? surveysData : (surveysData.surveys || []);
        const allItems = [...complaints, ...surveys];

        // Update stats
        const total = allItems.length;
        const pending = allItems.filter(c => c.status === 'pending').length;
        const inProgress = allItems.filter(c => c.status === 'in-progress').length;
        const resolved = allItems.filter(c => c.status === 'resolved').length;

        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-pending').textContent = pending;
        document.getElementById('stat-progress').textContent = inProgress;
        document.getElementById('stat-resolved').textContent = resolved;

        // Update recent items table (show latest 5 combining both complaints and surveys)
        const tbody = document.querySelector('#recentComplaintsTable tbody');
        
        // Sort all items by date instead of just slicing complaints
        const sortedItems = [...allItems].sort((a, b) => {
          const dateA = new Date(a.createdAt || a.surveyDate || a.submittedAt || 0);
          const dateB = new Date(b.createdAt || b.surveyDate || b.submittedAt || 0);
          return dateB - dateA;
        });
        const recent = sortedItems.slice(0, 5);

        if (recent.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;opacity:0.6;">📭 No complaints yet.</td></tr>';
        } else {
          tbody.innerHTML = recent.map(c => {
            const descParts = (c.description || '').split(' | ');
            const name = descParts[0].replace('Complaint by ', '').trim() || '—';
            const dateStr = c.createdAt
              ? new Date(c.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })
              : '—';
            return `
              <tr>
                <td>${name}</td>
                <td>${c.location || '—'}</td>
                <td>${formatCategory(c.category)}</td>
                <td><span class="status ${statusClass(c.status)}">${statusLabel(c.status)}</span></td>
                <td>${dateStr}</td>
              </tr>`;
          }).join('');
        }

        // Simple insights
        if (complaints.length > 0) {
          const areaCounts = {};
          complaints.forEach(c => {
            const area = c.location || 'Unknown';
            areaCounts[area] = (areaCounts[area] || 0) + 1;
          });
          const topArea = Object.entries(areaCounts).sort((a, b) => b[1] - a[1])[0];
          document.getElementById('insight-1').textContent = topArea
            ? `⚠ Most complaints from ${topArea[0]} (${topArea[1]} reports)`
            : '⚠ No area data available';

          const catCounts = {};
          complaints.forEach(c => {
            const cat = c.category || 'Unknown';
            catCounts[cat] = (catCounts[cat] || 0) + 1;
          });
          const topCat = Object.entries(catCounts).sort((a, b) => b[1] - a[1])[0];
          document.getElementById('insight-2').textContent = topCat
            ? `📈 Top issue: ${formatCategory(topCat[0])} (${topCat[1]} complaints)`
            : '📈 No category data available';
        } else {
          document.getElementById('insight-1').textContent = '⚠ No complaints data yet';
          document.getElementById('insight-2').textContent = '📈 Submit complaints to see insights';
        }

        // Update last refreshed timestamp
        const now = new Date();
        document.getElementById('lastUpdated').textContent = `Updated ${now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

        if (manual) {
          const btn = document.querySelector('.table .btn');
          const originalText = btn.textContent;
          btn.textContent = '✅ Refreshed';
          setTimeout(() => btn.textContent = originalText, 1500);
        }

      } catch (err) {
        console.error('Error loading dashboard:', err);
      }
    }

    // Initial load
    loadDashboardData();

    // Auto-refresh every 30 seconds for real-time updates
    setInterval(() => loadDashboardData(), 30000);
  </script>

</html>
