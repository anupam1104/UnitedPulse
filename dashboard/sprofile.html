<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnitedPulse | Track Reports</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
 body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background-image: url('bg4.jpeg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: var(--text-primary);
}
/*SIDEBAR*/
  .container {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
  width: 240px;
  background: linear-gradient(180deg, #421b4b, #0e1467);
  color: white;
  padding: 24px;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
.logo img { width: 40px; }
.nav-item {
  padding: 12px;
  color: white;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 1.05em;
  font-weight: 500;
}
  .nav-item:hover { background: rgba(255,255,255,0.15); 
}

.sidebar a { 
  text-decoration: none; 
}

.sidebar a .nav-item { 
  color: var(--text-primary, white); 
  text-decoration: none !important; 
}

/* Content */
.content { flex: 1; padding: 30px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
}
header h1 { margin: 0; }
/*Avatar*/
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('avatar.png') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.8rem;
  font-weight: 600;
  letter-spacing: 1px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.bib{
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 10px;
  color: white;
}

.info-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
.info-table th {
  text-align: left;
  padding: 12px;
  color: #94a3b8;
  width: 30%;
  font-weight: 500;
}

.info-table td {
  padding: 12px;
  color: #f8fafc;
}

/* Row divider */
.info-table tr {
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Stats - original */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  margin-top: 5px;
}
.card {
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(12px);
  color:white;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid var(--border);
}
.card h4 { margin: 0 0 10px; color: var(--text-secondary); font-size: 1.05em; font-weight: 500; }
.card p { font-size: 2rem; margin: 0; font-weight: 700; }

.yib{
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 10px;
  color: white;
  margin-top:20px;
}

</style>
</head>

<body>
      <!-- Sidebar -->
  <div class="container">  
  <aside class="sidebar">
  <div class="logo">
    <img src="../UPlogo.png">
    <h2>UnitedPulse</h2>
  </div>
  <a href="../dashboard/sdash.html" >
    <div class="nav-item active"><strong>Dashboard</strong></div>
  </a>
  
  <div class="nav-item"><strong>Profile</strong></div>
  <div style="margin-top: 20px;"></div>
  <a href="../dashboard/trackreport.html" class="nav-item"><i class="fas-fa-sign-out-alt" ></i><strong>Track Reports</strong></a>
  <div style="margin-top: 40px;"></div>
  <a href="../index.html" class="nav-item">
    <i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i><strong> LogOut</strong>
  </a>

</aside>

<!-- Content -->
<main class="content">

<header>
  <h1>Profile</h1>
  </header>
  
  <div class="avatar" id="avatar"></div>
  <script>
function getInitials(name) {
  return name
    .split(" ")
    .map(word => word[0])
    .join("")
    .toUpperCase();
}
const userName = "Anupam Mishra"; // later from backend
const initials = getInitials(userName);
document.getElementById("avatar").innerText = initials;
  </script>

<!-- Profile Card -->
  <div class="bib">
  <h3>BASIC INFORMATION</h3>

  <table class="info-table">
    <tr>
      <th>Name</th>
      <td id="name">Anupam Mishra</td>
    </tr>
    <tr>
      <th>Email</th>
      <td id="email">anupam@email.com</td>
    </tr>
    <tr>
      <th>Phone</th>
      <td id="phone">9876543210</td>
    </tr>
    <tr>
      <th>Organization Belonging</th>
      <td>xyz</td>
    </tr>
    <tr>
      <th>Role</th>
      <td>Surveyor</td>
    </tr>
  </table>
  </div>

  <!-- Stats - original labels -->
   <div class="yib">
  <h3>YOUR IMPACT</h3>
  </div>

<div class="stats">
  <div class="card"><h4>Surveys Submitted</h4><p>12</p></div>
  <div class="card"><h4>Areas Covered</h4><p>5</p></div>
  <div class="card"><h4>Under Review</h4><p>3</p></div>
  <div class="card"><h4>Approved</h4><p>9</p></div>
</div>


</body>
